name: Publish to npm

# Option A: the version lives in packages/cli/package.json. You bump it, commit,
# then publish a GitHub Release. This workflow publishes whatever version the
# package.json declares — after checking it matches the release tag.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify release tag matches package version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          # Strip a leading "v" from the tag (v0.2.0 -> 0.2.0) before comparing.
          TAG_VERSION=${TAG#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Release tag ($TAG_VERSION) does not match packages/cli/package.json version ($PKG_VERSION). Bump the version and re-tag."
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      # The CLI bundles a prebuilt, self-contained template produced by core's
      # separate build-template step. That file is gitignored, so CI must
      # regenerate it. Order matters:
      #   1. build core + its deps (schema, design-system, viewer) via tsc
      #   2. produce decklee-template.html (build-template)
      #   3. bundle the CLI (copy-template + esbuild) — template now exists
      - run: pnpm -F "@decklee/core..." build
      - run: pnpm -F @decklee/core build-template
      - run: pnpm -F decklee build

      - run: pnpm -F decklee publish --provenance --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
